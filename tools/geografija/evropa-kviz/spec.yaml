title: Evropa — geografski kviz
title_short: Evropa
locale: sr
randomize_numbers: true
description: 'Učenik upisuje broj pojma sa spiska u kvadrat na karti koji označava njegovu geografsku lokaciju. Ako pogreši, sistem traži ponovan unos i broji greške po polju i ukupno.

  '
map:
  extent:
    lon:
    - -25
    - 62
    lat:
    - 33.5
    - 72
  mid_lat_for_aspect: 53.0
  geo_data: ../../../shared/data/countries.geojson
style:
  colors:
    sea: '#cfe6f2'
    land: '#f3ecd8'
    border: '#8a8170'
    coast: '#5b5446'
    mountain: '#9c5a2c'
    river: '#2f7fb5'
    circle_edge: '#b1271f'
    circle_fill: '#ffffff'
ui:
  header_title: Evropa — geografski kviz
  header_subtitle: 'U svaki kvadrat na karti upiši <b>broj</b> pojma sa spiska koji se nalazi na toj lokaciji, pa pritisni <b>Enter</b> (ili klikni izvan polja). Ako pogrešiš, polje će tražiti da pokušaš
    ponovo. Broje se greške za svako polje.

    '
  header_subtitle_drag: '<b>Prevuci</b> svaki pojam sa spiska na njegovo mesto na karti. Ako ga spustiš dovoljno blizu, zaključa se zelenim i nacrta se na karti; inače pocrveni — prevuci ga ponovo dok ne pogodiš. Gore biraš <b>mod</b>: u <b>Učenju</b> svaka greška otkriva po jedan hint, a kad pogodiš izlazi pun opis pojma (bez bodovanja — tu se uči). U <b>Testu</b> nema hintova ni opisa: kad pojam tačno postaviš, dobijaš tri pitanja (lako, srednje, teško) sa po četiri odgovora od kojih je jedan ili više tačnih, a posle njih i bonus pitanje. U testu se broje greške — i za pogrešno mesto i za pogrešan odgovor.'
  list_heading: Spisak pojmova
  legend_mountains: ▲ braon linije = planine
  legend_rivers: — plave linije = reke
  legend_circles: ▢ = lokacija pojma (upiši broj)
  stat_correct: Mapa
  stat_answers: Pitanja
  stat_miss: Greške
  btn_reset: Počni ispočetka
  btn_borders_on: 'Granice: uključene'
  btn_borders_off: 'Granice: isključene'
  btn_borders_locked_title: Granice se menjaju samo na početku, pre prevlačenja prvog pojma.
  btn_export_csv: Preuzmi rezultate (CSV)
  mode_label: Pitanja
  mode_all: Sve ({n})
  mode_random: '{n} nasumičnih'
  toggle_features: Planine i reke
  toggle_borders: Granice
  toggle_bw: Crno-belo
  toggle_drag: Prevuci pojmove
  resume_indicator: Nastavak prethodne sesije — tvoj progres je sačuvan.
  zoom_hint: 'Zumiraj: dugmad +/−, točkić miša ili dvoklik · Prevuci za pomeranje'
  msg_correct: Tačno!
  msg_wrong: Pogrešno — pokušaj ponovo
  msg_revealed: Iskorišćeno 10 pokušaja — lokacija je otkrivena.
  msg_win: '🎉 Bravo! Sve tačno ({total}/{total}) · ukupno grešaka: {miss}'
  pdf_title_quiz: EVROPA — geografski pojmovi
