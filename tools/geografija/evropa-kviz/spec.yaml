# ============================================================================
# Evropa — geografski kviz (spec.yaml)
# ----------------------------------------------------------------------------
# Ovaj fajl je SAMO PODACI. Render logiku (HTML kviz + PDF radna/rešenja)
# obavlja classroom/shared/python/labeled_location_quiz.py preko make.py
# u istom folderu.
#
# Kako se rebuild radi:
#   cd classroom/tools/geografija/evropa-kviz/
#   python3 make.py
#
# Kako napraviti sličan kviz za drugi region:
#   cp -r classroom/templates/labeled-location-quiz/ classroom/tools/{predmet}/{novi-kviz}/
#   edit spec.yaml (extent, terms, geometry)
#   python3 make.py
# ============================================================================

title: "Evropa — geografski kviz"
title_short: "Evropa"
locale: sr

# Pri svakoj novoj sesiji (fresh load / reset / promena moda) sistem nasumično
# preraspoređuje brojeve pojmova (npr. "1 = Pirineji" jedne sesije, "1 = Krit"
# druge). Cilj: učenik ne pamti unose po brojevima, mora svaki put da gleda
# legendu i mapu. Set false za kvizove gde redosled ima značaja (npr. periodni
# sistem). localStorage čuva mapping tako da refresh ne menja numbering.
randomize_numbers: true

description: >
  Učenik upisuje broj pojma sa spiska u kvadrat na karti koji označava
  njegovu geografsku lokaciju. Ako pogreši, sistem traži ponovan unos i
  broji greške po polju i ukupno.

# Geografski opseg karte (longitude/latitude granice).
# mid_lat se koristi za aspect ratio (equirectangular projection).
map:
  extent:
    lon: [-25, 62]
    lat: [33.5, 72]
  mid_lat_for_aspect: 53.0
  geo_data: ../../../shared/data/countries.geojson  # relativno od ovog fajla

# Render styling — opcioni; renderer ima default-e ako se izostavi.
style:
  colors:
    sea: "#cfe6f2"
    land: "#f3ecd8"
    border: "#8a8170"
    coast: "#5b5446"
    mountain: "#9c5a2c"
    river: "#2f7fb5"
    circle_edge: "#b1271f"
    circle_fill: "#ffffff"

# UI tekstovi (lokalizovani; ako praviš verziju na drugom jeziku, samo ovo menjaš).
ui:
  header_title: "Evropa — geografski kviz"
  # Subtitle za "broj" mod (kad je 'Prevuci pojmove' isključen)
  header_subtitle: >
    U svaki kvadrat na karti upiši <b>broj</b> pojma sa spiska koji se nalazi
    na toj lokaciji, pa pritisni <b>Enter</b> (ili klikni izvan polja). Ako
    pogrešiš, polje će tražiti da pokušaš ponovo. Broje se greške za svako polje.
  # Subtitle za "drag" mod (kad je 'Prevuci pojmove' uključen) — automatski se prikazuje
  header_subtitle_drag: >
    <b>Prevuci</b> svaki pojam sa spiska na njegovu lokaciju na karti. Ako
    spustiš pojam dovoljno blizu prave lokacije, polje se zaključa zelenim.
    Inače postaje crveno — prevuci ga ponovo na drugo mesto dok ne pogodiš.
    Broje se greške za svaki pojam.
  list_heading: "Spisak pojmova"
  legend_mountains: "▲ braon linije = planine"
  legend_rivers: "— plave linije = reke"
  legend_circles: "▢ = lokacija pojma (upiši broj)"
  stat_correct: "Tačno"
  stat_miss: "Ukupno grešaka"
  btn_reset: "Počni ispočetka"
  btn_export_csv: "Preuzmi rezultate (CSV)"
  mode_label: "Pitanja"
  mode_all: "Sve ({n})"
  mode_random: "{n} nasumičnih"
  toggle_features: "Planine i reke"
  toggle_borders: "Granice"
  toggle_bw: "Crno-belo"
  toggle_drag: "Prevuci pojmove"
  resume_indicator: "Nastavak prethodne sesije — tvoj progres je sačuvan."
  zoom_hint: "Zumiraj: dugmad +/−, točkić miša ili dvoklik · Prevuci za pomeranje"
  msg_correct: "Tačno!"
  msg_wrong: "Pogrešno — pokušaj ponovo"
  msg_win: "🎉 Bravo! Sve tačno ({total}/{total}) · ukupno grešaka: {miss}"
  pdf_title_quiz: "EVROPA — geografski pojmovi"
  pdf_title_answer: "EVROPA — geografski pojmovi (REŠENJA)"
  pdf_legend_heading: "Upiši broj pojma u krug na karti:"
  pdf_legend_symbols: "▲ planine    — reke    ○ lokacija pojma"

# ----------------------------------------------------------------------------
# Termini — 42 geografska pojma.
#
# Svaki termin ima:
#   id           — broj pitanja (1-42), redom kako se prikazuje u listi
#   name         — naziv pojma na lokalu (na koji jezik je locale postavljen)
#   label_at     — [lon, lat] gde stoji kvadrat za unos broja na karti
#   geometry     — opciono; ako pojam je linija (planina ili reka), dodaje se polilinija
#       type     — "mountain" ili "river"
#       polyline — niz [lon, lat] tačaka
# ----------------------------------------------------------------------------

