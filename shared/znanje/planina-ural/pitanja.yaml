# Test-pitanja za: Planina Ural. Vidi shared/znanje/README.md › pitanja.yaml.
# Odgovorljivo iz index.md + izvori/wikipedia.md.
pitanja:
  - tezina: lako
    pitanje: "Šta je tačno o pravcu i ulozi Uralskih planina?"
    odgovori:
      - {tekst: "Pružaju se u pravcu sever—jug", tacan: true}
      - {tekst: "Smatraju se granicom između Evrope i Azije", tacan: true}
      - {tekst: "Pružaju se u pravcu istok—zapad", tacan: false}
      - {tekst: "Razdvajaju Afriku od Evrope", tacan: false}

  - tezina: srednje
    pitanje: "Šta je tačno o veličini i vrhovima Urala?"
    odgovori:
      - {tekst: "Dugačke su oko 2.100 km", tacan: true}
      - {tekst: "Najviši vrh je Narodnaja (1.895 m)", tacan: true}
      - {tekst: "Prostiru se kroz Rusiju i Kazahstan", tacan: true}
      - {tekst: "Najviši vrh je viši od 5.000 m", tacan: false}

  - tezina: tesko
    pitanje: "Šta je tačno o geologiji i podeli Urala?"
    odgovori:
      - {tekst: "Među najstarijim su planinskim lancima (250–300 miliona godina)", tacan: true}
      - {tekst: "Dele se na pet celina: Polarni, Subpolarni, Severni, Srednji i Južni Ural", tacan: true}
      - {tekst: "Neobično su dobro očuvane za svoje doba", tacan: true}
      - {tekst: "Nastale su pre svega vulkanskom aktivnošću u poslednjih milion godina", tacan: false}

bonus:
  pitanje: "Na osnovu celog članka — šta je tačno?"
  odgovori:
    - {tekst: "Nezvanična prestonica regiona je Jekaterinburg", tacan: true}
    - {tekst: "Region je bogat malahitom, zlatom i aleksandritom", tacan: true}
    - {tekst: "Postrojenje Majak kod Čeljabinska teško je zagadilo deo regiona", tacan: true}
    - {tekst: "Ural nema nijedan rezervat prirode", tacan: false}
