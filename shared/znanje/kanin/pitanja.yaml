# Test-pitanja za: Kanin. Vidi shared/znanje/README.md › pitanja.yaml.
# NAPOMENA: srpska Wikipedija nema zaseban članak o Kaninu; pitanja se drže
# ono malo što je potvrđeno (manje evropsko poluostrvo uz Belo more u Rusiji).
# Odgovorljivo iz index.md + izvori/wikipedia.md.
pitanja:
  - tezina: lako
    pitanje: "Kog je tipa geografski pojam Kanin?"
    odgovori:
      - {tekst: "Poluostrvo", tacan: true}
      - {tekst: "Ostrvo", tacan: false}
      - {tekst: "Reka", tacan: false}
      - {tekst: "Jezero", tacan: false}

  - tezina: srednje
    pitanje: "Gde se nalazi poluostrvo Kanin?"
    odgovori:
      - {tekst: "Na krajnjem severu evropske Rusije", tacan: true}
      - {tekst: "Uz Belo more", tacan: true}
      - {tekst: "U Sredozemnom moru", tacan: false}
      - {tekst: "Na jugu Grčke", tacan: false}

  - tezina: tesko
    pitanje: "Šta je tačno za Kanin prema srpskim izvorima?"
    odgovori:
      - {tekst: "Svrstava se u manja evropska poluostrva (uz Jiland, Kolu, Krim, Peloponez)", tacan: true}
      - {tekst: "Reka Kija na njemu se uliva u Belo more", tacan: true}
      - {tekst: "Razdvaja Belo more od Barencovog mora", tacan: true}
      - {tekst: "To je najveće poluostrvo Evrope", tacan: false}

bonus:
  pitanje: "Šta je tačno o izvorima za Kanin?"
  odgovori:
    - {tekst: "Srpska Wikipedija nema zaseban članak o ovom poluostrvu", tacan: true}
    - {tekst: "Pojam je potvrđen u opštem članku „Polustrvo“", tacan: true}
    - {tekst: "Postoji srodna odrednica o reci Kija (Kanin)", tacan: true}
    - {tekst: "O Kaninu postoji opširan zaseban srpski članak sa svim brojčanim podacima", tacan: false}
