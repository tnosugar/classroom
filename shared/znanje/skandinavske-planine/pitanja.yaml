# Test-pitanja za: Skandinavske planine. Vidi shared/znanje/README.md › pitanja.yaml.
# Odgovorljivo iz index.md + izvori/wikipedia.md.
pitanja:
  - tezina: lako
    pitanje: "Kroz koje države se prostiru Skandinavske planine?"
    odgovori:
      - {tekst: "Norveška", tacan: true}
      - {tekst: "Švedska", tacan: true}
      - {tekst: "Finska", tacan: true}
      - {tekst: "Danska", tacan: false}

  - tezina: srednje
    pitanje: "Šta je tačno za vrhove Skandinavskih planina?"
    odgovori:
      - {tekst: "Galdhepigen je najviši vrh (2.469 m)", tacan: true}
      - {tekst: "Kebnekajse je najviši vrh na švedskoj strani (2.104 m)", tacan: true}
      - {tekst: "Najviša tačka Finske je padina Halti", tacan: true}
      - {tekst: "Najviši vrh celog venca nalazi se u Švedskoj", tacan: false}

  - tezina: tesko
    pitanje: "Šta je tačno o geologiji i nastanku venca?"
    odgovori:
      - {tekst: "Građen je od veoma starih stena (~400 miliona godina)", tacan: true}
      - {tekst: "Često se pogrešno poistovećuje sa Skandinavskim kaledonima", tacan: true}
      - {tekst: "Izdizanjem zapadne strane reke su usmerene ka istoku", tacan: true}
      - {tekst: "Nastao je vulkanskom aktivnošću pre ~50 miliona godina", tacan: false}

bonus:
  pitanje: "Na osnovu članaka u izvorima, šta je tačno?"
  odgovori:
    - {tekst: "Galdhepigen se nalazi u masivu Jotunhejmen", tacan: true}
    - {tekst: "Jostedalsbren je najveći glečer kopnene Evrope", tacan: true}
    - {tekst: "Druga najviša planina Norveške je Glitertind", tacan: true}
    - {tekst: "Najviši vrhovi su koncentrisani oko Narvika", tacan: false}
