# Test-pitanja za: Sredozemno more. Vidi shared/znanje/README.md › pitanja.yaml.
# Odgovorljivo iz index.md + izvori/wikipedia.md.
pitanja:
  - tezina: lako
    pitanje: "Između kojih kontinenata leži Sredozemno more?"
    odgovori:
      - {tekst: "Evrope", tacan: true}
      - {tekst: "Azije", tacan: true}
      - {tekst: "Afrike", tacan: true}
      - {tekst: "Australije", tacan: false}

  - tezina: srednje
    pitanje: "Kako je Sredozemno more povezano sa drugim morima i okeanima?"
    odgovori:
      - {tekst: "Sa Atlantskim okeanom preko Gibraltarskog moreuza", tacan: true}
      - {tekst: "Sa Crnim morem preko Bosfora", tacan: true}
      - {tekst: "Sa Crvenim morem preko Kilskog kanala", tacan: false}
      - {tekst: "Sa Baltičkim morem preko Sueckog kanala", tacan: false}

  - tezina: tesko
    pitanje: "Šta je tačno o vodnom bilansu i podeli mora?"
    odgovori:
      - {tekst: "Ima negativan bilans vode — leti ispari više nego što dobije", tacan: true}
      - {tekst: "Bez dotoka iz Atlantika nikada ne bi presušilo", tacan: false}
      - {tekst: "Salinitet mu je niži od saliniteta Baltičkog mora", tacan: false}
      - {tekst: "Najveća dubina mu je manja od 500 m", tacan: false}

bonus:
  pitanje: "Na osnovu članaka u izvorima, šta je tačno?"
  odgovori:
    - {tekst: "Tokom Mesinske krize saliniteta more se gotovo potpuno isušilo", tacan: true}
    - {tekst: "Ime potiče od latinskog mediterraneus — usred kopna", tacan: true}
    - {tekst: "Dno mora je u potpunosti od kore starije od pet milijardi godina", tacan: false}
    - {tekst: "More se puni isključivo iz Crvenog mora, bez veze sa Atlantikom", tacan: false}
