# Test-pitanja za: Krim. Vidi shared/znanje/README.md › pitanja.yaml.
# Odgovorljivo iz index.md + izvori/wikipedia.md.
pitanja:
  - tezina: lako
    pitanje: "Na obali kog mora se nalazi poluostrvo Krim?"
    odgovori:
      - {tekst: "Crno more", tacan: true}
      - {tekst: "Sredozemno more", tacan: false}
      - {tekst: "Baltičko more", tacan: false}
      - {tekst: "Severno more", tacan: false}

  - tezina: srednje
    pitanje: "Šta je tačno za Krim?"
    odgovori:
      - {tekst: "Uz zapadnu obalu dodiruje i Azovsko more", tacan: true}
      - {tekst: "Površina je oko 27.000 km²", tacan: true}
      - {tekst: "Najveći deo ima kontinentalnu klimu", tacan: true}
      - {tekst: "Sa kopnom je povezan širokim kopnenim mostom dugim stotine kilometara", tacan: false}

  - tezina: tesko
    pitanje: "Šta je tačno o istoriji i stanovništvu Krima?"
    odgovori:
      - {tekst: "Antičko ime poluostrva bilo je Taurika (Taurida)", tacan: true}
      - {tekst: "1954. je prebačen iz sovjetske Rusije u sovjetsku Ukrajinu", tacan: true}
      - {tekst: "Po popisu iz 2001. većinu čine etnički Rusi", tacan: true}
      - {tekst: "Poluostrvo nikada nije bilo pod osmanskom vlašću", tacan: false}

bonus:
  pitanje: "Na osnovu celog članka — šta je tačno?"
  odgovori:
    - {tekst: "Knez Vladimir I je 988. kršten u gradu Hersonesu na Krimu", tacan: true}
    - {tekst: "Najvažnija grčka kolonija bio je Hersones Taurijski (osnovan 422. p. n. e.)", tacan: true}
    - {tekst: "Krimski kanat je od 1475. postao vazal Osmanskog carstva", tacan: true}
    - {tekst: "Najviše padavina na Krimu ima na krajnjem severu poluostrva", tacan: false}
