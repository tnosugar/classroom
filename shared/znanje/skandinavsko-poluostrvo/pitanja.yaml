# Test-pitanja za: Skandinavsko poluostrvo. Vidi shared/znanje/README.md › pitanja.yaml.
# Odgovorljivo iz index.md + izvori/wikipedia.md.
pitanja:
  - tezina: lako
    pitanje: "Šta je tačno za Skandinavsko poluostrvo?"
    odgovori:
      - {tekst: "Najveće je poluostrvo u Evropi", tacan: true}
      - {tekst: "Na njemu su Norveška i Švedska", tacan: true}
      - {tekst: "Obuhvata i severozapadni deo Finske", tacan: true}
      - {tekst: "Nalazi se na jugu Evrope", tacan: false}

  - tezina: srednje
    pitanje: "Koje vode okružuju Skandinavsko poluostrvo?"
    odgovori:
      - {tekst: "Baltičko more", tacan: true}
      - {tekst: "Norveško more", tacan: true}
      - {tekst: "Crno more", tacan: false}
      - {tekst: "Kaspijsko jezero", tacan: false}

  - tezina: tesko
    pitanje: "Šta je tačno o geologiji i visini poluostrva?"
    odgovori:
      - {tekst: "Počiva na Baltičkom štitu", tacan: true}
      - {tekst: "Površina mu je oko 75.000 km²", tacan: false}
      - {tekst: "Najviši vrh je Galdhepigen visok svega 469 m", tacan: false}
      - {tekst: "Teren se postglacijalno spušta oko 1 km po veku", tacan: false}

bonus:
  pitanje: "Na osnovu članaka u izvorima, šta je tačno?"
  odgovori:
    - {tekst: "Ime potiče od regije Skanija (Skåne)", tacan: true}
    - {tekst: "Najsevernija tačka je rt Nordkap kod Bergena", tacan: false}
    - {tekst: "Zbog rude gvožđa izgrađena je pruga do luke u Lisabonu", tacan: false}
    - {tekst: "Prvi generalni sekretar UN bio je Italijan", tacan: false}
