bonus:
  pitanje: "Na osnovu članaka u izvorima, šta je tačno?"
  odgovori:
    - {tekst: "Nedostatak kiseonika omogućio je očuvanje starih brodskih olupina", tacan: true}
    - {tekst: "Pre ledenog doba Crno more je verovatno bilo slatkovodno jezero", tacan: true}
    - {tekst: "Grčki naziv Euxeinos Pontos znači Gostoljubivo more", tacan: true}
    - {tekst: "Crno more je potpuno odsečeno od svetskog okeana, bez ijednog prolaza", tacan: false}
