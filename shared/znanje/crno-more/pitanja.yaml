# Test-pitanja za: Crno more. Vidi shared/znanje/README.md › pitanja.yaml.
# Odgovorljivo iz index.md + izvori/wikipedia.md.
pitanja:
  - tezina: lako
    pitanje: "Koji moreuz povezuje Crno more sa Mramornim morem?"
    odgovori:
      - {tekst: "Bosfor", tacan: true}
      - {tekst: "Gibraltarski moreuz", tacan: false}
      - {tekst: "Dardaneli", tacan: false}
      - {tekst: "Kerčki prolaz", tacan: false}

  - tezina: srednje
    pitanje: "Koje reke se ulivaju u Crno more?"
