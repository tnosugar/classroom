# Test-pitanja za: Pirinejsko poluostrvo. Vidi shared/znanje/README.md › pitanja.yaml.
# Odgovorljivo iz index.md + izvori/wikipedia.md.
pitanja:
  - tezina: lako
    pitanje: "Koje države zauzimaju najveći deo Pirinejskog poluostrva?"
    odgovori:
      - {tekst: "Španija", tacan: true}
      - {tekst: "Portugalija", tacan: true}
      - {tekst: "Italija", tacan: false}
      - {tekst: "Grčka", tacan: false}

  - tezina: srednje
    pitanje: "Šta je tačno za Pirinejsko poluostrvo?"
    odgovori:
      - {tekst: "Od ostatka Evrope odvajaju ga Pirineji", tacan: true}
      - {tekst: "Nalazi se na krajnjem severoistoku Evrope", tacan: false}
      - {tekst: "Drugi naziv mu je Apeninsko poluostrvo", tacan: false}
      - {tekst: "Na jugu ga Bosfor odvaja od Azije", tacan: false}

  - tezina: tesko
    pitanje: "Šta je tačno o geografiji poluostrva?"
    odgovori:
      - {tekst: "Najzapadnije je od tri južnoevropska poluostrva", tacan: true}
      - {tekst: "Najveći deo zauzima visoravan Centralna meseta", tacan: true}
      - {tekst: "Sa severa i zapada okružuje ga Atlantski okean", tacan: true}
      - {tekst: "Najmanje je poluostrvo u Evropi", tacan: false}

bonus:
  pitanje: "Na osnovu članaka u izvorima, šta je tačno?"
  odgovori:
    - {tekst: "Rimljani su poluostrvo nazivali Hispanija", tacan: true}
    - {tekst: "Mavari su jug poluostrva nazivali Al-Andaluz", tacan: true}
    - {tekst: "Baskijski jezik je blizak srodnik španskog", tacan: false}
    - {tekst: "Rekonkista je završena padom Madrida 1812.", tacan: false}
