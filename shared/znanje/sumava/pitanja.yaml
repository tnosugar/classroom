# Test-pitanja za: Šumava. Vidi shared/znanje/README.md › pitanja.yaml.
# Odgovorljivo iz index.md + izvori/wikipedia.md.
pitanja:
  - tezina: lako
    pitanje: "Na granici kojih država se nalazi Šumava?"
    odgovori:
      - {tekst: "Češke, Nemačke i Austrije", tacan: true}
      - {tekst: "Poljske, Ukrajine i Slovačke", tacan: false}
      - {tekst: "Francuske, Nemačke i Švajcarske", tacan: false}
      - {tekst: "Mađarske, Rumunije i Srbije", tacan: false}

  - tezina: srednje
    pitanje: "Šta je tačno za Šumavu?"
    odgovori:
      - {tekst: "Vododelnica je sliva Dunava i reke Vltave", tacan: true}
      - {tekst: "Najviši vrh na nemačkoj strani je Veliki Javor (1.456 m)", tacan: true}
      - {tekst: "Duga je oko 200 km", tacan: true}
      - {tekst: "Najviši vrh prelazi 3.000 m", tacan: false}

  - tezina: tesko
    pitanje: "Šta je tačno o imenu i zaštiti Šumave?"
    odgovori:
      - {tekst: "Ime se izvodi iz praslovenske reči „šuma“ (gusta šuma)", tacan: true}
      - {tekst: "Na češkoj strani je Nacionalni park Šumava, poznat po risovima", tacan: true}
      - {tekst: "Nemački naziv je Böhmerwald (Češka šuma)", tacan: true}
      - {tekst: "Ime potiče iz keltskog jezika i znači „sneg“", tacan: false}

bonus:
  pitanje: "Na osnovu članaka u izvorima, šta je tačno?"
  odgovori:
    - {tekst: "Na češko-austrijskoj granici je vrh Plehi (1.378 m)", tacan: true}
    - {tekst: "Od 1994. postoji evroregion oko Šumave (~16.000 km²)", tacan: true}
    - {tekst: "Srodan toponim u Srbiji je Šumadija („zemlja gustih šuma“)", tacan: true}
    - {tekst: "Šumava je vododelnica Rajne i Labe", tacan: false}
