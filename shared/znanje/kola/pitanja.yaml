# Test-pitanja za: Kola (Koljsko poluostrvo). Vidi shared/znanje/README.md › pitanja.yaml.
# Odgovorljivo iz index.md + izvori/wikipedia.md.
pitanja:
  - tezina: lako
    pitanje: "U kojoj se državi nalazi Koljsko poluostrvo?"
    odgovori:
      - {tekst: "Rusija", tacan: true}
      - {tekst: "Norveška", tacan: false}
      - {tekst: "Finska", tacan: false}
      - {tekst: "Švedska", tacan: false}

  - tezina: srednje
    pitanje: "Koja mora okružuju Koljsko poluostrvo?"
    odgovori:
      - {tekst: "Barencovo more na severu", tacan: true}
      - {tekst: "Belo more na jugu i istoku", tacan: true}
      - {tekst: "Sredozemno more na jugu", tacan: false}
      - {tekst: "Egejsko more na istoku", tacan: false}

  - tezina: tesko
    pitanje: "Šta je tačno za Koljsko poluostrvo?"
    odgovori:
      - {tekst: "Površina je oko 100.000 km²", tacan: true}
      - {tekst: "Glavna luka regiona je Murmansk", tacan: true}
      - {tekst: "Geološki zauzima severoistočni rub Baltičkog štita", tacan: true}
      - {tekst: "Nalazi se daleko južno od arktičkog kruga, u suptropskom pojasu", tacan: false}

bonus:
  pitanje: "Na osnovu članaka u izvorima, šta je tačno?"
  odgovori:
    - {tekst: "Luka Murmansk ostaje bez leda i zimi zahvaljujući blizini Golfske struje", tacan: true}
    - {tekst: "Poluostrvo je dom naroda Sami (Laponija)", tacan: true}
    - {tekst: "Planine Hibini sadrže najvišu tačku poluostrva", tacan: true}
    - {tekst: "Poluostrvo je gotovo bez rudnog bogatstva", tacan: false}
