# Test-pitanja za: Jiland (Jutland). Vidi shared/znanje/README.md › pitanja.yaml.
# Odgovorljivo iz index.md + izvori/wikipedia.md.
pitanja:
  - tezina: lako
    pitanje: "Kojoj državi pripada najveći deo poluostrva Jiland?"
    odgovori:
      - {tekst: "Danska", tacan: true}
      - {tekst: "Norveška", tacan: false}
      - {tekst: "Švedska", tacan: false}
      - {tekst: "Holandija", tacan: false}

  - tezina: srednje
    pitanje: "Koje more se prostire uz zapadnu obalu Jilanda?"
    odgovori:
      - {tekst: "Severno more", tacan: true}
      - {tekst: "Crno more", tacan: false}
      - {tekst: "Sredozemno more", tacan: false}
      - {tekst: "Jadransko more", tacan: false}

  - tezina: tesko
    pitanje: "Šta je tačno za Jiland?"
    odgovori:
      - {tekst: "Na jugu se graniči sa Nemačkom", tacan: true}
      - {tekst: "Ime znači „zemlja Jita“", tacan: true}
      - {tekst: "Danski deo čini više od 2/3 površine Danske", tacan: true}
      - {tekst: "To je ostrvo potpuno odvojeno od kopna Evrope", tacan: false}

bonus:
  pitanje: "Na osnovu članaka u izvorima, šta je tačno?"
  odgovori:
    - {tekst: "Severnojutlandsko ostrvo je od kopna odvojeno Limfjordom posle poplave 1825.", tacan: true}
    - {tekst: "Najjužniji deo poluostrva (Šlezvig-Holštajn) pripada Nemačkoj", tacan: true}
    - {tekst: "Angli, Sasi i Jiti su oko 450. g. migrirali iz Britanije na Jiland", tacan: false}
    - {tekst: "Skagerak se prostire uz južnu granicu poluostrva", tacan: false}
