# Test-pitanja za: Balkanske planine. Vidi shared/znanje/README.md › pitanja.yaml.
# Odgovorljivo iz index.md + izvori/wikipedia.md.
pitanja:
  - tezina: lako
    pitanje: "U kom pravcu se pružaju Balkanske planine i do kog mora izlaze?"
    odgovori:
      - {tekst: "Zapad–istok, do Crnog mora", tacan: true}
      - {tekst: "Sever–jug, do Jadranskog mora", tacan: false}
      - {tekst: "Sever–jug, do Egejskog mora", tacan: false}
      - {tekst: "Zapad–istok, do Sredozemnog mora", tacan: false}

  - tezina: srednje
    pitanje: "Šta je tačno za Balkanske planine?"
    odgovori:
      - {tekst: "Najviši vrh je Botev (2.376 m) u Bugarskoj", tacan: true}
      - {tekst: "Osovinu venca čini Stara planina", tacan: true}
      - {tekst: "Prostiru se kroz Srbiju, Bugarsku i Tursku", tacan: true}
      - {tekst: "Najviši vrh je Midžor u Srbiji", tacan: false}

  - tezina: tesko
    pitanje: "Šta je tačno o pripadnosti i delovima venca?"
    odgovori:
      - {tekst: "Deo su Alpsko-himalajskog sistema", tacan: true}
      - {tekst: "Severno podnožje nosi naziv Predbalkan", tacan: true}
      - {tekst: "Južno podnožje naziva se Dinaridi", tacan: false}
      - {tekst: "Pripadaju Skandinavskim kaledonima", tacan: false}

bonus:
  pitanje: "Na osnovu članaka u izvorima, šta je tačno?"
  odgovori:
    - {tekst: "Naziv „Balkan“ je persijskog porekla i znači „brdoviti kraj“", tacan: true}
    - {tekst: "Rimsko ime masiva bilo je Karpates", tacan: false}
    - {tekst: "U Srbiji je najviši vrh Triglav (2.864 m)", tacan: false}
    - {tekst: "Venac se na istoku završava kod Gibraltarskog moreuza", tacan: false}
