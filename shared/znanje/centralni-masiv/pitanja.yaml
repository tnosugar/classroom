# Test-pitanja za: Centralni masiv. Vidi shared/znanje/README.md › pitanja.yaml.
# Odgovorljivo iz index.md + izvori/wikipedia.md.
pitanja:
  - tezina: lako
    pitanje: "U kojoj državi se nalazi Centralni masiv?"
    odgovori:
      - {tekst: "Francuska", tacan: true}
      - {tekst: "Nemačka", tacan: false}
      - {tekst: "Italija", tacan: false}
      - {tekst: "Španija", tacan: false}

  - tezina: srednje
    pitanje: "Šta je tačno za Centralni masiv?"
    odgovori:
      - {tekst: "Najviši vrh je Pij de Sansi (1.886 m)", tacan: true}
      - {tekst: "Od Alpa ga odvajaju doline reka Rone i Sone", tacan: true}
      - {tekst: "Najviši vrh prelazi 4.000 m", tacan: false}
      - {tekst: "Cela oblast nalazi se u severnoj Italiji", tacan: false}

  - tezina: tesko
    pitanje: "Šta je tačno o postanku i površini masiva?"
    odgovori:
      - {tekst: "To su stare gromadne planine, formirane pre ~500 miliona godina", tacan: true}
      - {tekst: "Pokriva oko 85.000 km² (~15% Francuske)", tacan: true}
      - {tekst: "Ima najveću koncentraciju ugaslih vulkana na svetu", tacan: true}
      - {tekst: "Nastao je alpskom orogenezom pre ~50 miliona godina", tacan: false}

bonus:
  pitanje: "Na osnovu članaka u izvorima, šta je tačno?"
  odgovori:
    - {tekst: "U masivu se nalaze regioni Overnja i Limuzen", tacan: true}
    - {tekst: "Najveći gradovi su Marsej i Lion", tacan: false}
    - {tekst: "Vulkanska aktivnost prestala je pre oko milion godina", tacan: false}
    - {tekst: "Najviši vrh je Mon Blan", tacan: false}
