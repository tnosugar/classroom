# Test-pitanja za: Peninske planine. Vidi shared/znanje/README.md › pitanja.yaml.
# Odgovorljivo iz index.md + izvori/wikipedia.md.
pitanja:
  - tezina: lako
    pitanje: "Gde se nalaze Peninske planine?"
    odgovori:
      - {tekst: "U Engleskoj (Velika Britanija)", tacan: true}
      - {tekst: "U Irskoj", tacan: false}
      - {tekst: "U Škotskoj visoravni", tacan: false}
      - {tekst: "Na Skandinavskom poluostrvu", tacan: false}

  - tezina: srednje
    pitanje: "Šta je tačno za Peninske planine?"
    odgovori:
      - {tekst: "Najviši vrh je Kros Fel (893 m)", tacan: true}
      - {tekst: "Pružaju se sever–jug u dužini od oko 300 km", tacan: true}
      - {tekst: "Niske su i zaravnjene, sa blagim padinama", tacan: true}
      - {tekst: "Najviši vrh prelazi 2.000 m", tacan: false}

  - tezina: tesko
    pitanje: "Šta je tačno o geologiji i privredi Penina?"
    odgovori:
      - {tekst: "Izgrađene su od stena karbonske starosti", tacan: true}
      - {tekst: "Kameni ugalj iz podnožja učinio ih je industrijskim krajem", tacan: true}
      - {tekst: "Nastale su vulkanskom aktivnošću u kvartaru", tacan: false}
      - {tekst: "Protežu se od reke Temze do reke Severn", tacan: false}

bonus:
  pitanje: "Na osnovu članaka u izvorima, šta je tačno?"
  odgovori:
    - {tekst: "Na istočnim padinama su Jorkšir i grad Njukasl", tacan: true}
    - {tekst: "Na zapadnim padinama je oblast Andaluzija", tacan: false}
    - {tekst: "Pre industrijske revolucije bili su gusto naseljen rudarski centar bez šuma", tacan: false}
    - {tekst: "Najviši vrh Kros Fel nalazi se u Škotskoj", tacan: false}
