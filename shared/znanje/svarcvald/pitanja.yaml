# Test-pitanja za: Švarcvald. Vidi shared/znanje/README.md › pitanja.yaml.
# Odgovorljivo iz index.md + izvori/wikipedia.md.
pitanja:
  - tezina: lako
    pitanje: "U kojoj državi se nalazi Švarcvald?"
    odgovori:
      - {tekst: "Nemačka (Baden-Virtemberg)", tacan: true}
      - {tekst: "Francuska (Lorena)", tacan: false}
      - {tekst: "Austrija (Tirol)", tacan: false}
      - {tekst: "Švajcarska", tacan: false}

  - tezina: srednje
    pitanje: "Šta je tačno za Švarcvald?"
    odgovori:
      - {tekst: "Ime „Crna šuma“ potiče od tamnih četinarskih šuma", tacan: true}
      - {tekst: "Sa zapada i juga okružen je dolinom Rajne", tacan: true}
      - {tekst: "Najviši vrh je Feldberg, koji prelazi 3.000 m", tacan: false}
      - {tekst: "Nalazi se u saveznoj državi Bavarska", tacan: false}

  - tezina: tesko
    pitanje: "Šta je tačno o vodama Švarcvalda?"
    odgovori:
      - {tekst: "U njemu nastaje reka Dunav (od reka Brigah i Breg)", tacan: true}
      - {tekst: "U njemu izvire reka Rajna", tacan: false}
      - {tekst: "Vododelnica je između Atlantskog okeana i Sredozemnog mora", tacan: false}
      - {tekst: "U njemu izvire reka Visla", tacan: false}

bonus:
  pitanje: "Na osnovu članaka u izvorima, šta je tačno?"
  odgovori:
    - {tekst: "Poznat je po satovima sa kukavicom i torti sa trešnjama", tacan: true}
    - {tekst: "Najsunčaniji je planinski venac u jugozapadnoj Nemačkoj", tacan: true}
    - {tekst: "Dug je oko 170 km, a širok oko 60 km", tacan: true}
    - {tekst: "Najviši vrh Feldberg nalazi se u Austriji", tacan: false}
