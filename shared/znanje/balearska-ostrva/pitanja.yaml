# Test-pitanja za: Balearska ostrva. Vidi shared/znanje/README.md › pitanja.yaml.
# Odgovorljivo iz index.md + izvori/wikipedia.md.
pitanja:
  - tezina: lako
    pitanje: "Kojoj državi pripadaju Balearska ostrva?"
    odgovori:
      - {tekst: "Španiji", tacan: true}
      - {tekst: "Italiji", tacan: false}
      - {tekst: "Grčkoj", tacan: false}
      - {tekst: "Francuskoj", tacan: false}

  - tezina: srednje
    pitanje: "Šta je tačno za Balearska ostrva?"
    odgovori:
      - {tekst: "Glavni grad je Palma de Majorka", tacan: true}
      - {tekst: "Zvanični jezici su katalonski i španski", tacan: true}
      - {tekst: "Nalaze se u Sredozemnom moru", tacan: true}
      - {tekst: "Najveće ostrvo je Ibiza", tacan: false}

  - tezina: tesko
    pitanje: "Od kojih ostrva se sastoji arhipelag?"
    odgovori:
      - {tekst: "Grupa Gimnezijas obuhvata Majorku, Menorku i Kabreru", tacan: true}
      - {tekst: "Grupa Pitijusas obuhvata Ibizu i Formenteru", tacan: true}
      - {tekst: "Najveće ostrvo je Majorka", tacan: true}
      - {tekst: "Sva ostrva pripadaju jednoj jedinstvenoj grupi", tacan: false}

bonus:
  pitanje: "Na osnovu celog članka — šta je tačno?"
  odgovori:
    - {tekst: "Mavare je sa ostrva isterao aragonski kralj Đaume I 1229. godine", tacan: true}
    - {tekst: "Glavni izvori prihoda su ribarstvo, poljoprivreda i turizam", tacan: true}
    - {tekst: "Broj stanovnika je kroz decenije rastao i prešao milion", tacan: true}
    - {tekst: "Prvi stanovnici ostrva bili su Vikinzi", tacan: false}
